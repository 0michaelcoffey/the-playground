<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA // AI Chat Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14; --bg-panel: #0c1220; --bg-card: #0f1826;
      --border: #1a2a44; --border-hi: #1e4080; --accent: #2b7fff;
      --accent-dim: #1a4a99; --green: #1aba7a; --amber: #e89c2a;
      --text-1: #d8e8ff; --text-2: #7a9cc4; --text-3: #3a5a80;
      --font-mono: 'Share Tech Mono', monospace; --font-body: 'Exo 2', sans-serif;
      --radius: 6px;
    }

    body {
      background: var(--bg); color: var(--text-1);
      font-family: var(--font-body); margin: 0; display: flex; flex-direction: column; height: 100vh;
    }

    /* Scanline & Grid */
    .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(43,127,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(43,127,255,0.05) 1px, transparent 1px); background-size: 40px 40px; }
    .scanline { position: fixed; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(43,127,255,0.4), transparent); animation: scandown 6s linear infinite; pointer-events: none; z-index: 1; }
    @keyframes scandown { 0% { top: 0; } 100% { top: 100vh; } }

    .nav-header {
      position: relative; z-index: 10; padding: 1rem 1.5rem;
      background: var(--bg-panel); border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .back-link { font-family: var(--font-mono); color: var(--accent); text-decoration: none; font-size: 13px; }
    .back-link:hover { text-decoration: underline; }

    .main-container {
      position: relative; z-index: 10; display: grid; grid-template-columns: 300px 1fr;
      flex: 1; overflow: hidden;
    }

    /* Sidebar Styles */
    .sidebar {
      background: rgba(12, 18, 32, 0.8); border-right: 1px solid var(--border);
      padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
    }
    .sidebar-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; }
    
    .persona-btn {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text-2);
      padding: 12px; border-radius: var(--radius); cursor: pointer; text-align: left;
      transition: all 0.2s; font-family: var(--font-body);
    }
    .persona-btn:hover { border-color: var(--accent-dim); }
    .persona-btn.active { border-color: var(--accent); background: rgba(43,127,255,0.1); color: var(--text-1); }
    .persona-name { display: block; font-weight: 600; font-size: 14px; }
    .persona-desc { font-size: 11px; color: var(--text-3); }

    /* Chat Area */
    .chat-area { display: flex; flex-direction: column; padding: 1.5rem; overflow-y: auto; gap: 1rem; }
    
    .log-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem; animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .log-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .log-tag { font-family: var(--font-mono); font-size: 10px; color: var(--accent); border: 1px solid var(--accent-dim); padding: 2px 6px; border-radius: 4px; }
    .log-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
    .log-body { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 1rem; }
    
    .log-actions { display: flex; gap: 10px; }
    .action-btn {
      font-family: var(--font-mono); font-size: 11px; background: transparent;
      border: 1px solid var(--border); color: var(--text-3); padding: 4px 10px;
      border-radius: 4px; cursor: pointer; transition: 0.2s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Input Area */
    .input-wrapper {
      padding: 1.5rem; background: var(--bg-panel); border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }
    textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text-1);
      padding: 12px; border-radius: var(--radius); font-family: var(--font-body);
      resize: none; height: 80px; transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .input-footer { display: flex; justify-content: space-between; align-items: center; }
    .hint { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
    
    .launch-btn {
      background: var(--accent); color: white; border: none; padding: 8px 24px;
      border-radius: var(--radius); font-family: var(--font-mono); font-size: 13px;
      font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s;
    }
    .launch-btn:hover { opacity: 0.9; }
    .launch-btn:active { transform: scale(0.98); }

    @media (max-width: 768px) {
      .main-container { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="scanline"></div>

  <nav class="nav-header">
    <a href="../index.html" class="back-link">← BACK TO HUB</a>
    <div style="font-family: var(--font-mono); font-size: 12px; color: var(--text-3);">SYSTEM: ARIA // STATUS: ONLINE</div>
  </nav>

  <main class="main-container">
    <aside class="sidebar">
      <span class="sidebar-label">Select Persona</span>
      <div id="persona-list" style="display: flex; flex-direction: column; gap: 8px;">
        <!-- Personas injected by JS -->
      </div>
    </aside>

    <section class="chat-area" id="chat-logs">
      <div class="log-card" style="border-style: dashed; opacity: 0.7;">
        <div class="log-body" style="margin:0; text-align: center; padding: 2rem;">
          <div style="font-size: 24px; margin-bottom: 10px;">🤖</div>
          Ready to transmit. Choose a persona and enter your objective below.
        </div>
      </div>
    </section>
  </main>

  <footer class="input-wrapper">
    <textarea id="user-input" placeholder="Enter your message to transmit to Claude..."></textarea>
    <div class="input-footer">
      <span class="hint">SHIFT + ENTER TO NEW LINE // CLICK LAUNCH TO OPEN CLAUDE</span>
      <button class="launch-btn" onclick="launchPrompt()">LAUNCH TRANSMISSION</button>
    </div>
  </footer>

  <script>
    const PERSONAS = {
      aria: {
        name: "ARIA Default",
        desc: "Balanced, helpful, and technically minded.",
        prefix: "You are ARIA, a helpful AI assistant. Be concise, professional, and focus on technical accuracy."
      },
      coder: {
        name: "Code Companion",
        desc: "Expert at debugging and clean architecture.",
        prefix: "You are a Senior Software Engineer. Provide clean, performant code. Explain logic clearly but briefly."
      },
      strategist: {
        name: "Strategist",
        desc: "Focuses on high-level planning and logic.",
        prefix: "You are a Strategic Analyst. Break down my request into logical steps, risks, and opportunities."
      },
      creative: {
        name: "Creative Spark",
        desc: "Unconventional, descriptive, and vivid.",
        prefix: "You are a Creative Consultant. Think outside the box, use vivid metaphors, and prioritize originality."
      }
    };

    let activePersona = 'aria';

    function init() {
      const list = document.getElementById('persona-list');
      for (const [key, p] of Object.entries(PERSONAS)) {
        const btn = document.createElement('button');
        btn.className = `persona-btn ${key === activePersona ? 'active' : ''}`;
        btn.onclick = () => selectPersona(key);
        btn.innerHTML = `
          <span class="persona-name">${p.name}</span>
          <span class="persona-desc">${p.desc}</span>
        `;
        btn.id = `p-${key}`;
        list.appendChild(btn);
      }
    }

    function selectPersona(key) {
      document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`p-${key}`).classList.add('active');
      activePersona = key;
    }

    function launchPrompt() {
      const text = document.getElementById('user-input').value.trim();
      if (!text) return;

      const fullPrompt = `${PERSONAS[activePersona].prefix}\n\nUSER REQUEST: ${text}`;
      const encoded = encodeURIComponent(fullPrompt);
      const url = `https://claude.ai/new?q=${encoded}`;

      // Add to log
      const logs = document.getElementById('chat-logs');
      const card = document.createElement('div');
      card.className = 'log-card';
      const time = new Date().toLocaleTimeString();
      
      card.innerHTML = `
        <div class="log-header">
          <span class="log-tag">${PERSONAS[activePersona].name}</span>
          <span class="log-time">${time}</span>
        </div>
        <div class="log-body">${text.substring(0, 150)}${text.length > 150 ? '...' : ''}</div>
        <div class="log-actions">
          <button class="action-btn" onclick="window.open('${url}', '_blank')">OPEN IN CLAUDE</button>
          <button class="action-btn" onclick="navigator.clipboard.writeText(\`${fullPrompt.replace(/`/g, '\\`')}\`)">COPY FULL PROMPT</button>
        </div>
      `;
      
      logs.prepend(card);
      document.getElementById('user-input').value = '';
      
      // Auto-open tab
      window.open(url, '_blank');
    }

    // Handle Ctrl+Enter to launch
    document.getElementById('user-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        launchPrompt();
      }
    });

    init();
  </script>
</body>
</html>
