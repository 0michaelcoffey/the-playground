<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Playground</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Background grid + scanline -->
  <div class="bg-grid"></div>
  <div class="scanline"></div>

  <div class="shell">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-mark">PG</div>
        <div>
          <h1 class="site-title">The <span>Playground</span></h1>
          <p class="site-sub">// experiment hub &nbsp;·&nbsp; <span id="clock"></span></p>
        </div>
      </div>
      <div class="header-right">
        <div class="status-pill">
          <span class="status-dot"></span>ALL SYSTEMS NOMINAL
        </div>
      </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-box">
        <span class="stat-label">Experiments</span>
        <span class="stat-val" id="stat-total">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Live</span>
        <span class="stat-val live" id="stat-live">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">In Progress</span>
        <span class="stat-val wip" id="stat-wip">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Ideas Queued</span>
        <span class="stat-val" id="stat-ideas">0</span>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="ai-tools">AI Tools</button>
      <button class="filter-btn" data-filter="data-viz">Data Viz</button>
      <button class="filter-btn" data-filter="games">Games</button>
      <button class="filter-btn" data-filter="creative">Creative</button>
      <button class="filter-btn" data-filter="productivity">Productivity</button>
      <button class="filter-btn" data-filter="image-art">Image &amp; Art</button>
    </div>

    <!-- Experiment grid -->
    <div class="exp-grid" id="exp-grid">
      <!-- Cards injected by JS -->
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>// The Playground &nbsp;·&nbsp; built with Claude</span>
      <span id="build-date"></span>
    </footer>

  </div>

  <script src="js/experiments.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
